<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Force-Directed Graph</title>
<style>
:root {
  --theme-foreground: #1b1e23;
  --theme-background: #ffffff;
  --theme-foreground-faint: color-mix(in srgb, #1b1e23 50%, #ffffff);
  --theme-foreground-fainter: color-mix(in srgb, #1b1e23 30%, #ffffff);
}
body {
  margin: 0;
  display: flex;
  justify-content: center;
  font-family: -apple-system, sans-serif;
}
</style>
</head>
<body>
<script type="module">
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

const width = 928;
const height = 600;

// Load data (replace with your data source)
const data = await d3.json("miserables.json");

// Copy to avoid mutation
const nodes = data.nodes.map(d => ({...d}));
const links = data.links.map(d => ({...d}));

const color = d3.scaleOrdinal(d3.schemeObservable10);

const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id))
    .force("charge", d3.forceManyBody())
    .force("center", d3.forceCenter(width / 2, height / 2));

const svg = d3.create("svg")
    .attr("width", width)
    .attr("height", height)
    .attr("viewBox", [0, 0, width, height])
    .attr("style", "max-width: 100%; height: auto;");

// Zoom
const g = svg.append("g");
svg.call(d3.zoom()
    .scaleExtent([0.5, 8])
    .on("zoom", ({transform}) => g.attr("transform", transform)));

// Links
const link = g.append("g")
    .attr("stroke", "var(--theme-foreground-faint)")
    .attr("stroke-opacity", 0.6)
  .selectAll("line")
  .data(links)
  .join("line")
    .attr("stroke-width", d => Math.sqrt(d.value));

// Nodes
const node = g.append("g")
    .attr("stroke", "var(--theme-background)")
    .attr("stroke-width", 1.5)
  .selectAll("circle")
  .data(nodes)
  .join("circle")
    .attr("r", 5)
    .attr("fill", d => color(d.group));

node.append("title").text(d => d.id);

// Drag
node.call(d3.drag()
    .on("start", (event, d) => {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    })
    .on("drag", (event, d) => {
      d.fx = event.x; d.fy = event.y;
    })
    .on("end", (event, d) => {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null; d.fy = null;
    }));

// Tick
simulation.on("tick", () => {
  link
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node
      .attr("cx", d => d.x).attr("cy", d => d.y);
});

document.body.appendChild(svg.node());
</script>
</body>
</html>
