<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cluster Scatter Plot</title>
<style>
:root {
  --theme-foreground: #1b1e23;
  --theme-background: #ffffff;
  --theme-foreground-faint: color-mix(in srgb, #1b1e23 50%, #ffffff);
  --theme-foreground-fainter: color-mix(in srgb, #1b1e23 30%, #ffffff);
}
body { margin: 20px; font-family: -apple-system, sans-serif; }
</style>
</head>
<body>
<script type="module">
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

const width = 640;
const height = 500;
const margin = { top: 20, right: 20, bottom: 35, left: 40 };

// Example: 3-cluster synthetic data
const k = 3;
const pointsPerCluster = 50;
const data = [];
const trueCentroids = [[2, 3], [6, 6], [8, 2]];

for (let c = 0; c < k; c++) {
  for (let i = 0; i < pointsPerCluster; i++) {
    data.push({
      x: trueCentroids[c][0] + (Math.random() - 0.5) * 3,
      y: trueCentroids[c][1] + (Math.random() - 0.5) * 3,
      cluster: c
    });
  }
}

const color = d3.scaleOrdinal(d3.schemeObservable10);

const x = d3.scaleLinear()
    .domain(d3.extent(data, d => d.x)).nice()
    .range([margin.left, width - margin.right]);

const y = d3.scaleLinear()
    .domain(d3.extent(data, d => d.y)).nice()
    .range([height - margin.bottom, margin.top]);

const svg = d3.create("svg")
    .attr("width", width).attr("height", height)
    .attr("viewBox", [0, 0, width, height])
    .attr("style", "max-width: 100%; height: auto;");

// Voronoi decision boundaries
const centroids = d3.groups(data, d => d.cluster).map(([, pts]) => [
  d3.mean(pts, d => d.x),
  d3.mean(pts, d => d.y)
]);

const delaunay = d3.Delaunay.from(centroids, d => x(d[0]), d => y(d[1]));
const voronoi = delaunay.voronoi([margin.left, margin.top, width - margin.right, height - margin.bottom]);

svg.append("g")
  .selectAll("path")
  .data(centroids)
  .join("path")
    .attr("d", (d, i) => voronoi.renderCell(i))
    .attr("fill", (d, i) => d3.color(color(i)).copy({opacity: 0.05}))
    .attr("stroke", "var(--theme-foreground-fainter)")
    .attr("stroke-dasharray", "4,2");

// Axes
svg.append("g")
    .attr("transform", `translate(0,${height - margin.bottom})`)
    .call(d3.axisBottom(x).ticks(6))
    .call(g => g.select(".domain").remove());

svg.append("g")
    .attr("transform", `translate(${margin.left},0)`)
    .call(d3.axisLeft(y).ticks(6))
    .call(g => g.select(".domain").remove());

// Data points
svg.append("g")
  .selectAll("circle")
  .data(data)
  .join("circle")
    .attr("cx", d => x(d.x))
    .attr("cy", d => y(d.y))
    .attr("r", 4)
    .attr("fill", d => color(d.cluster))
    .attr("stroke", "var(--theme-background)")
    .attr("stroke-width", 1);

// Centroids
svg.append("g")
  .selectAll("circle")
  .data(centroids)
  .join("circle")
    .attr("cx", d => x(d[0]))
    .attr("cy", d => y(d[1]))
    .attr("r", 8)
    .attr("fill", "none")
    .attr("stroke", (d, i) => color(i))
    .attr("stroke-width", 2.5);

document.body.appendChild(svg.node());
</script>
</body>
</html>
