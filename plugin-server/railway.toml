[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash -c 'python manage.py migrate --noinput && gunicorn plugin_server.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120'"
healthcheckPath = "/api/plugins/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
