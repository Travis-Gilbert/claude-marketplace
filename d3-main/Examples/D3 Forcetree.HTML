<!-- Force-directed tree (D3 v7+) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Force-Directed Tree</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f7f7f7;
        }
    </style>
</head>
<body>
<svg id="chart"></svg>

<!-- D3 v7 (or v6) -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
    // ------------------------------------------------------------------
    // 1. Replace this with your own hierarchical data (d3.hierarchy input)
    // ------------------------------------------------------------------
    const data = {
        name: "root",
        children: [
            {
                name: "group A",
                children: [
                    { name: "a1" },
                    { name: "a2" },
                    { name: "a3" }
                ]
            },
            {
                name: "group B",
                children: [
                    { name: "b1" },
                    {
                        name: "b2",
                        children: [
                            { name: "b2-1" },
                            { name: "b2-2" }
                        ]
                    }
                ]
            }
        ]
    };

    // ------------------------------------------------------------------
    // 2. Chart dimensions
    // ------------------------------------------------------------------
    const width = 928;
    const height = 600;

    // ------------------------------------------------------------------
    // 3. Build hierarchy, links, and nodes
    // ------------------------------------------------------------------
    const root = d3.hierarchy(data);
    const links = root.links();
    const nodes = root.descendants();

    // ------------------------------------------------------------------
    // 4. Force simulation
    // ------------------------------------------------------------------
    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links)
            .id(d => d.id)
            .distance(0)
            .strength(1))
        .force("charge", d3.forceManyBody().strength(-50))
        .force("x", d3.forceX())
        .force("y", d3.forceY());

    // ------------------------------------------------------------------
    // 5. SVG container
    // ------------------------------------------------------------------
    const svg = d3.select("#chart")
        .attr("width", width)
        .attr("height", height)
        .attr("viewBox", [-width / 2, -height / 2, width, height])
        .style("max-width", "100%")
        .style("height", "auto");

    // ------------------------------------------------------------------
    // 6. Links
    // ------------------------------------------------------------------
    const link = svg.append("g")
        .attr("stroke", "#999")
        .attr("stroke-opacity", 0.6)
        .selectAll("line")
        .data(links)
        .join("line");

    // ------------------------------------------------------------------
    // 7. Nodes
    // ------------------------------------------------------------------
    const node = svg.append("g")
        .attr("fill", "#fff")
        .attr("stroke", "#000")
        .attr("stroke-width", 1.5)
        .selectAll("circle")
        .data(nodes)
        .join("circle")
        .attr("fill", d => d.children ? null : "#000")
        .attr("stroke", d => d.children ? null : "#fff")
        .attr("r", 3.5)
        .call(drag(simulation));

    node.append("title")
        .text(d => d.data.name);

    // ------------------------------------------------------------------
    // 8. Simulation tick handler
    // ------------------------------------------------------------------
    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node
            .attr("cx", d => d.x)
            .attr("cy", d => d.y);
    });

    // ------------------------------------------------------------------
    // 9. Drag behavior
    // ------------------------------------------------------------------
    function drag(simulation) {
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        return d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended);
    }
</script>
</body>
</html>
